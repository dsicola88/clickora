# PostgreSQL local (dev). Na raiz: `docker compose up -d` (com Docker Desktop a correr).
# Porta 5434 no host: evita 5432 (Postgres local) e 5433 (outros stacks Docker, p.ex. clickora).
# O .env: postgresql://dpiloto:dpiloto@127.0.0.1:5434/paid_autopilot

services:
  db:
    image: postgres:16-alpine
    container_name: dpilotoaut-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dpiloto
      POSTGRES_PASSWORD: dpiloto
      POSTGRES_DB: paid_autopilot
    ports:
      - "5434:5432"
    volumes:
      - dpilotoaut_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  dpilotoaut_pgdata:
