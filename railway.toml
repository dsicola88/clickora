# Deploy da API a partir da raiz do monorepo (Railway).
# Build e start só em /backend — não usa o package.json da raiz como app Node.
# Depois do primeiro deploy: em Railway → Settings → adiciona Postgres e variáveis (DATABASE_URL, etc.).
# Opcional: Release Command = cd backend && npx prisma migrate deploy

[build]
builder = "nixpacks"
buildCommand = "cd backend && npm ci && npm run build"

[deploy]
startCommand = "cd backend && npm start"
